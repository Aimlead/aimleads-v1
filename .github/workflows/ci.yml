name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'claude/**'
      - 'codex/**'
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATA_PROVIDER: local
      AUTH_PROVIDER: legacy
      SESSION_SECRET: test-session-secret
      SUPABASE_FALLBACK_TO_LOCAL: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests with coverage
        run: npm run test:ui:coverage

      - name: Upload UI coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: coverage
          if-no-files-found: error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - api-tests
      - ui-tests
    env:
      NODE_ENV: production
      VITE_DATA_PROVIDER: local
      VITE_AUTH_PROVIDER: legacy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
