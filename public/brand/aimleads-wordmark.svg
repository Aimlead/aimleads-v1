<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <defs>
    <linearGradient id="wm-lg" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="30%"  stop-color="#9333ea"/>
      <stop offset="60%"  stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- "aim" text -->
  <text
    x="0" y="46"
    font-family="'Nunito','Poppins','Inter',system-ui,sans-serif"
    font-size="50"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#wm-lg)"
  >aim</text>
  <!-- Bar chart elements (between aim and leads) -->
  <rect x="108" y="26" width="7" height="22" rx="3" fill="url(#wm-lg)"/>
  <rect x="118" y="14" width="7" height="34" rx="3" fill="url(#wm-lg)"/>
  <rect x="128" y="20" width="7" height="28" rx="3" fill="url(#wm-lg)"/>
  <!-- "leads" text -->
  <text
    x="140" y="46"
    font-family="'Nunito','Poppins','Inter',system-ui,sans-serif"
    font-size="50"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#wm-lg)"
  >leads</text>
</svg>
