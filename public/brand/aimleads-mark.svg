<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 66" fill="none">
  <defs>
    <linearGradient id="mark-lg" x1="4" y1="62" x2="56" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="45%"  stop-color="#be185d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Left leg of A -->
  <line x1="4"  y1="60" x2="30" y2="8" stroke="url(#mark-lg)" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Right outer leg -->
  <line x1="56" y1="60" x2="30" y2="8" stroke="url(#mark-lg)" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Inner right element (from crossbar to peak) -->
  <line x1="43" y1="38" x2="30" y2="8" stroke="url(#mark-lg)" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="14" y1="38" x2="46" y2="38" stroke="url(#mark-lg)" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Signal dot at top -->
  <circle cx="30" cy="6" r="5" fill="#f97316"/>
</svg>
