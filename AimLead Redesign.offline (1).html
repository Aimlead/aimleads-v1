  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 Tight', 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-display: 'Inter Tight', 'Inter', ui-sans-serif, system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* Amber accent — shared across themes */\n  --accent: oklch(72% 0.16 65);\n  --accent-strong: oklch(65% 0.18 60);\n  --accent-soft: oklch(96% 0.04 80);\n  --accent-ink: oklch(30% 0.08 60);\n\n  /* Semantic */\n  --hot: oklch(62% 0.2 25);\n  --hot-bg: oklch(96% 0.04 25);\n  --warm: oklch(72% 0.16 65);\n  --warm-bg: oklch(96% 0.05 80);\n  --cool: oklch(65% 0.12 230);\n  --cool-bg: oklch(96% 0.03 230);\n  --ok: oklch(60% 0.13 160);\n  --ok-bg: oklch(96% 0.05 160);\n  --err: oklch(58% 0.21 25);\n}\n\n/* LIGHT theme (default) */\n.theme-light {\n  --bg: oklch(98.5% 0.003 80);\n  --bg-elev: #ffffff;\n  --bg-elev-2: oklch(97% 0.004 80);\n  --surface: #ffffff;\n  --surface-muted: oklch(97.5% 0.003 80);\n  --border: oklch(92% 0.004 80);\n  --border-strong: oklch(86% 0.005 80);\n  --divider: oklch(94% 0.003 80);\n  --ink: oklch(20% 0.01 80);\n  --ink-2: oklch(38% 0.01 80);\n  --ink-3: oklch(55% 0.008 80);\n  --ink-4: oklch(70% 0.006 80);\n  --sidebar-bg: oklch(15% 0.01 80);\n  --sidebar-ink: oklch(96% 0.003 80);\n  --sidebar-ink-2: oklch(70% 0.008 80);\n  --sidebar-border: oklch(22% 0.01 80);\n  --sidebar-hover: oklch(20% 0.01 80);\n  --sidebar-active: oklch(25% 0.015 80);\n  --shadow-sm: 0 1px 2px rgba(15, 17, 22, 0.04);\n  --shadow: 0 2px 4px rgba(15, 17, 22, 0.04), 0 1px 2px rgba(15, 17, 22, 0.03);\n  --shadow-lg: 0 12px 32px -12px rgba(15, 17, 22, 0.12), 0 4px 8px -2px rgba(15, 17, 22, 0.04);\n  --focus-ring: oklch(72% 0.16 65 / 0.35);\n}\n\n/* DARK theme */\n.theme-dark {\n  --bg: oklch(14% 0.008 80);\n  --bg-elev: oklch(17% 0.008 80);\n  --bg-elev-2: oklch(19% 0.01 80);\n  --surface: oklch(17% 0.008 80);\n  --surface-muted: oklch(20% 0.01 80);\n  --border: oklch(24% 0.01 80);\n  --border-strong: oklch(30% 0.012 80);\n  --divider: oklch(22% 0.008 80);\n  --ink: oklch(96% 0.004 80);\n  --ink-2: oklch(78% 0.006 80);\n  --ink-3: oklch(62% 0.008 80);\n  --ink-4: oklch(48% 0.008 80);\n  --sidebar-bg: oklch(11% 0.008 80);\n  --sidebar-ink: oklch(94% 0.004 80);\n  --sidebar-ink-2: oklch(62% 0.008 80);\n  --sidebar-border: oklch(18% 0.01 80);\n  --sidebar-hover: oklch(16% 0.01 80);\n  --sidebar-active: oklch(20% 0.012 80);\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);\n  --shadow: 0 2px 6px rgba(0, 0, 0, 0.35);\n  --shadow-lg: 0 16px 40px -12px rgba(0, 0, 0, 0.6);\n  --focus-ring: oklch(72% 0.16 65 / 0.45);\n\n  --hot-bg: oklch(28% 0.08 25);\n  --warm-bg: oklch(28% 0.08 70);\n  --cool-bg: oklch(28% 0.06 230);\n  --ok-bg: oklch(28% 0.07 160);\n  --accent-soft: oklch(28% 0.08 70);\n  --accent-ink: oklch(85% 0.1 70);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-sans);\n  color: var(--ink);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-feature-settings: \"ss01\", \"cv11\";\n}\n\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }\ninput, select, textarea { font-family: inherit; }\n\n/* ============ App shell ============ */\n.app {\n  display: grid;\n  grid-template-columns: 232px 1fr;\n  height: 100%;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--font-sans);\n}\n\n.sidebar {\n  background: var(--sidebar-bg);\n  color: var(--sidebar-ink);\n  border-right: 1px solid var(--sidebar-border);\n  display: flex;\n  flex-direction: column;\n  padding: 18px 14px 14px;\n  min-height: 100%;\n}\n.sidebar-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 4px 6px 14px;\n  margin-bottom: 10px;\n  border-bottom: 1px solid var(--sidebar-border);\n}\n.sidebar-logo {\n  width: 28px; height: 28px;\n  border-radius: 8px;\n  background: linear-gradient(135deg, var(--accent), var(--accent-strong));\n  displ ar(--divider);\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  gap: 10px;\n  background: var(--bg-elev);\n}\n.slideover-body {\n  flex: 1;\n  overflow-y: auto;\n  padding: 16px 20px 20px;\n  display: flex;\n  flex-direction: column;\n  gap: 16px;\n}\n.slideover-foot {\n  padding: 12px 20px;\n  border-top: 1px solid var(--divider);\n  display: flex;\n  gap: 8px;\n  background: var(--bg-elev);\n}\n.slideover-foot .btn { flex: 1; justify-content: center; }\n\n/* ============ Utility ============ */\n.row { display: flex; align-items: center; gap: 8px; }\n.col { display: flex; flex-direction: column; gap: 8px; }\n.grow { flex: 1; }\n.chip {\n  display: inline-flex; align-items: center; gap: 4px;\n  font-size: 11.5px;\n  padding: 2px 8px;\n  border-radius: 6px;\n  background: var(--surface-muted);\n  color: var(--ink-2);\n  font-weight: 500;\n  border: 1px solid var(--border);\n}\n.chip-link { color: var(--accent-strong); background: var(--accent-soft); border-color: transparent; }\n.theme-dark .chip-link { color: oklch(85% 0.12 70); }\n\nhr.divider { border: none; border-top: 1px solid var(--divider); margin: 0; }\n\n.tabular { font-variant-numeric: tabular-nums; }\n.mono { font-family: var(--font-mono); }\n\n/* Status dots */\n.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }\n.dot-hot { background: var(--hot); }\n.dot-warm { background: var(--warm); }\n.dot-cool { background: var(--cool); }\n.dot-ok { background: var(--ok); }\n\n/* Subtle focus ring */\n:focus-visible {\n  outline: 2px solid var(--focus-ring);\n  outline-offset: 2px;\n}\n\n/* Scrollbar */\n.content::-webkit-scrollbar, .slideover-body::-webkit-scrollbar { width: 8px; height: 8px; }\n.content::-webkit-scrollbar-thumb, .slideover-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }\n.content::-webkit-scrollbar-track { background: transparent; }\n\n/* 2-col content */\n.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n.two-col-asymm { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }\n\n/* Lead tag strip */\n.tag-strip {\n  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;\n}\n\n/* ICP line rows */\n.lead-icp-line {\n  display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;\n  padding: 8px 0; font-size: 12.5px;\n}\n.lead-icp-line + .lead-icp-line { border-top: 1px dashed var(--divider); }\n.lead-icp-label { color: var(--ink-2); font-weight: 500; }\n.lead-icp-bar { height: 4px; background: var(--surface-muted); border-radius: 3px; overflow: hidden; }\n.lead-icp-bar-fill { height: 100%; background: var(--ink); border-radius: 3px; }\n.lead-icp-val { font-variant-numeric: tabular-nums; color: var(--ink-2); font-size: 12px; font-weight: 600; font-family: var(--font-mono); min-width: 28px; text-align: right; }\n\n/* subtle inset panel */\n.inset {\n  background: var(--surface-muted);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  padding: 14px;\n}\n.theme-dark .inset { background: var(--bg-elev-2); }\n\n/* Activity bar */\n.sparkbar { display: flex; align-items: flex-end; gap: 2px; height: 28px; }\n.sparkbar span {\n  flex: 1;\n  background: var(--accent);\n  border-radius: 1px;\n  min-height: 2px;\n  opacity: 0.85;\n}\n.sparkbar span:hover { opacity: 1; }\n\n/* Hero next lead (novel moment) */\n.next-lead-hero {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  padding: 20px 22px;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 22px;\n  align-items: center;\n  position: relative;\n  overflow: hidden;\n}\n.next-lead-hero::after {\n  content: '';\n  position: absolute;\n  top: 0; right: 0; width: 240px; height: 100%;\n  background: radial-gradient(closest-side, var(--accent-soft), transparent 80%);\n  opacity: 0.7;\n  pointer-events: none;\n}\n.next-lead-tag {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-si
